<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>今日打卡 ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --warm: #FF8C69;
    --soft-pink: #FFD6CC;
    --cream: #FFF8F5;
    --amber: #FFAA5A;
    --sage: #A8C5A0;
    --sky: #A8D0E6;
    --text: #3A2E2A;
    --muted: #9A8A85;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Soft background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #FFD6CC, #FFAA5A);
    top: -100px; right: -100px;
    animation: floatA 8s ease-in-out infinite alternate;
  }
  body::after {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #A8D0E6, #A8C5A0);
    bottom: -80px; left: -80px;
    animation: floatB 10s ease-in-out infinite alternate;
  }

  @keyframes floatA { from { transform: translate(0,0) scale(1); } to { transform: translate(30px, 20px) scale(1.1); } }
  @keyframes floatB { from { transform: translate(0,0) scale(1); } to { transform: translate(-20px, -30px) scale(1.08); } }

  .container {
    position: relative; z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: slideDown 0.6s ease both;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .date-badge {
    display: inline-block;
    background: white;
    border: 1.5px solid var(--soft-pink);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(255,140,105,0.1);
  }

  .header h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 38px;
    color: var(--text);
    line-height: 1.2;
  }

  .header p {
    margin-top: 8px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Cards */
  .card {
    background: white;
    border-radius: 24px;
    padding: 28px 24px;
    margin-bottom: 18px;
    box-shadow: 0 4px 24px rgba(58,46,42,0.06);
    border: 1.5px solid rgba(255,214,204,0.5);
    animation: fadeUp 0.5s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-icon {
    font-size: 32px;
    margin-bottom: 10px;
    display: block;
  }

  .card-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    font-weight: 300;
  }

  /* Mood selector */
  .mood-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .mood-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 12px 6px;
    border-radius: 16px;
    border: 2px solid transparent;
    background: var(--cream);
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .mood-btn:active { transform: scale(0.92); }

  .mood-btn .emoji { font-size: 24px; }
  .mood-btn .label { font-size: 10px; color: var(--muted); }

  .mood-btn.selected {
    border-color: var(--warm);
    background: var(--soft-pink);
    box-shadow: 0 4px 14px rgba(255,140,105,0.25);
    transform: scale(1.05);
  }

  .mood-btn.selected .label { color: var(--warm); font-weight: 500; }

  /* Toggle switches */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
  }

  .toggle-row + .toggle-row {
    border-top: 1px solid var(--soft-pink);
  }

  .toggle-info { flex: 1; }
  .toggle-name { font-size: 15px; color: var(--text); font-weight: 400; }
  .toggle-hint { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 300; }

  .toggle {
    position: relative;
    width: 52px;
    height: 28px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: #E8E0DE;
    transition: background 0.3s ease;
  }

  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .toggle input:checked ~ .toggle-track { background: var(--sage); }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(24px); }

  /* Note area */
  .note-area {
    width: 100%;
    resize: none;
    border: 1.5px solid var(--soft-pink);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .note-area::placeholder { color: #C5B8B3; }
  .note-area:focus { border-color: var(--warm); background: white; }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 18px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, var(--warm), var(--amber));
    color: white;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(255,140,105,0.4);
    transition: all 0.2s ease;
    animation: fadeUp 0.5s ease 0.4s both;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:active { transform: scale(0.97); box-shadow: 0 3px 12px rgba(255,140,105,0.3); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* History */
  .history-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: 1.5px solid var(--soft-pink);
    background: white;
    color: var(--muted);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
    animation: fadeUp 0.5s ease 0.5s both;
  }

  .history-btn:active { background: var(--cream); }

  /* Success overlay */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,248,245,0.92);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .success-overlay.show { opacity: 1; pointer-events: all; }

  .success-inner {
    text-align: center;
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .success-overlay.show .success-inner { transform: scale(1); }

  .success-emoji { font-size: 72px; margin-bottom: 16px; display: block; animation: bounce 0.8s ease; }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    80% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .success-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 10px;
  }

  .success-msg { font-size: 14px; color: var(--muted); font-weight: 300; line-height: 1.8; }

  .success-close {
    margin-top: 32px;
    padding: 14px 40px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, var(--warm), var(--amber));
    color: white;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(255,140,105,0.35);
  }

  /* History panel */
  .history-panel {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 200;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .history-panel.open { transform: translateX(0); }

  .history-header {
    position: sticky;
    top: 0;
    background: var(--cream);
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--soft-pink);
    z-index: 10;
  }

  .back-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--soft-pink);
    background: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
    flex-shrink: 0;
  }

  .history-header h2 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 22px;
    color: var(--text);
  }

  .history-content { padding: 20px; }

  .history-item {
    background: white;
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 12px;
    border: 1.5px solid rgba(255,214,204,0.5);
    box-shadow: 0 2px 12px rgba(58,46,42,0.04);
  }

  .history-date { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  .history-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 14px; color: var(--text); }

  .history-note { font-size: 13px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--soft-pink); font-weight: 300; line-height: 1.6; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .empty-emoji { font-size: 48px; display: block; margin-bottom: 12px; }

  /* Streak badge */
  .streak-bar {
    background: linear-gradient(135deg, rgba(255,140,105,0.12), rgba(255,170,90,0.12));
    border: 1.5px solid rgba(255,140,105,0.25);
    border-radius: 18px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    animation: fadeUp 0.5s ease 0.05s both;
  }

  .streak-emoji { font-size: 28px; }
  .streak-text { font-size: 13px; color: var(--muted); font-weight: 300; }
  .streak-num { font-size: 22px; font-weight: 500; color: var(--warm); line-height: 1; }

  /* Checked state */
  .already-checked {
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.5s ease both;
  }

  .checked-emoji { font-size: 64px; display: block; margin-bottom: 16px; }
  .checked-title { font-family: 'Ma Shan Zheng', cursive; font-size: 28px; color: var(--text); margin-bottom: 8px; }
  .checked-sub { font-size: 14px; color: var(--muted); font-weight: 300; line-height: 1.8; }
</style>
</head>
<body>

<div class="container" id="mainView">
  <!-- Header -->
  <div class="header">
    <div class="date-badge" id="dateBadge"></div>
    <h1>今天也要好好的 🌸</h1>
    <p>记录每一个平凡而珍贵的日子</p>
  </div>

  <!-- Streak -->
  <div class="streak-bar">
    <span class="streak-emoji">🔥</span>
    <div>
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-text">连续打卡天数</div>
    </div>
  </div>

  <!-- Already checked view -->
  <div class="already-checked" id="checkedView" style="display:none">
    <span class="checked-emoji">✨</span>
    <div class="checked-title">今天已经打卡啦！</div>
    <div class="checked-sub">明天再来记录新的一天吧<br>你很棒，继续保持 💕</div>
    <button class="history-btn" style="margin-top:24px" onclick="openHistory()">📖 查看打卡记录</button>
  </div>

  <!-- Form -->
  <div id="formView">
    <!-- Mood card -->
    <div class="card">
      <span class="card-icon">☀️</span>
      <div class="card-title">今天快乐吗？</div>
      <div class="card-sub">选一个最符合你今天心情的</div>
      <div class="mood-grid">
        <button class="mood-btn" onclick="selectMood(this, '😢', '很难过')" data-mood="很难过">
          <span class="emoji">😢</span>
          <span class="label">很难过</span>
        </button>
        <button class="mood-btn" onclick="selectMood(this, '😕', '有点低落')" data-mood="有点低落">
          <span class="emoji">😕</span>
          <span class="label">有点低落</span>
        </button>
        <button class="mood-btn" onclick="selectMood(this, '😐', '还好')" data-mood="还好">
          <span class="emoji">😐</span>
          <span class="label">还好</span>
        </button>
        <button class="mood-btn" onclick="selectMood(this, '😊', '比较开心')" data-mood="比较开心">
          <span class="emoji">😊</span>
          <span class="label">比较开心</span>
        </button>
        <button class="mood-btn" onclick="selectMood(this, '🥰', '超级快乐')" data-mood="超级快乐">
          <span class="emoji">🥰</span>
          <span class="label">超级快乐</span>
        </button>
      </div>
    </div>

    <!-- Sleep card -->
    <div class="card">
      <span class="card-icon">🌙</span>
      <div class="card-title">作息打卡</div>
      <div class="card-sub">记录今天的睡眠情况</div>

      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-name">🌅 今天早起了吗</div>
          <div class="toggle-hint">8点前起床算早起</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="earlyRise">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-name">🌙 昨晚早睡了吗</div>
          <div class="toggle-hint">11点前入睡算早睡</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="earlySleep">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <!-- Note card -->
    <div class="card">
      <span class="card-icon">✏️</span>
      <div class="card-title">今天想说点什么？</div>
      <div class="card-sub">一句话也好，可以不写</div>
      <textarea class="note-area" id="noteText" rows="3" placeholder="今天发生了什么有意思的事…"></textarea>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" onclick="submitCheckin()">
      完成今日打卡 ✨
    </button>

    <button class="history-btn" onclick="openHistory()">
      📖 查看打卡记录
    </button>
  </div>
</div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-inner">
    <span class="success-emoji" id="successEmoji">🎉</span>
    <div class="success-title">打卡成功！</div>
    <div class="success-msg" id="successMsg"></div>
    <button class="success-close" onclick="closeSuccess()">太棒了 💕</button>
  </div>
</div>

<!-- History Panel -->
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <button class="back-btn" onclick="closeHistory()">←</button>
    <h2>我的打卡记录</h2>
  </div>
  <div class="history-content" id="historyContent"></div>
</div>

<script>
const MOOD_EMOJIS = { '很难过': '😢', '有点低落': '😕', '还好': '😐', '比较开心': '😊', '超级快乐': '🥰' };
let selectedMood = null;

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(key) {
  const [y, m, d] = key.split('-');
  const weekdays = ['日','一','二','三','四','五','六'];
  const date = new Date(+y, +m-1, +d);
  return `${y}年${m}月${d}日 星期${weekdays[date.getDay()]}`;
}

function getRecords() {
  return JSON.parse(localStorage.getItem('checkin_records') || '{}');
}

function saveRecord(key, data) {
  const records = getRecords();
  records[key] = data;
  localStorage.setItem('checkin_records', JSON.stringify(records));
}

function calcStreak() {
  const records = getRecords();
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (records[key]) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function init() {
  const today = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  document.getElementById('dateBadge').textContent = 
    `${today.getMonth()+1}月${today.getDate()}日 星期${weekdays[today.getDay()]}`;
  
  document.getElementById('streakNum').textContent = calcStreak();

  const todayKey = getTodayKey();
  const records = getRecords();
  if (records[todayKey]) {
    document.getElementById('formView').style.display = 'none';
    document.getElementById('checkedView').style.display = 'block';
  }
}

function selectMood(btn, emoji, label) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMood = label;
}

function submitCheckin() {
  if (!selectedMood) {
    const cards = document.querySelectorAll('.card');
    cards[0].style.outline = '2px solid var(--warm)';
    setTimeout(() => cards[0].style.outline = '', 1000);
    return;
  }

  const earlyRise = document.getElementById('earlyRise').checked;
  const earlySleep = document.getElementById('earlySleep').checked;
  const note = document.getElementById('noteText').value.trim();

  const data = { mood: selectedMood, earlyRise, earlySleep, note, ts: Date.now() };
  saveRecord(getTodayKey(), data);

  // Build success message
  const msgs = [];
  if (selectedMood === '超级快乐' || selectedMood === '比较开心') msgs.push('今天心情不错，真好！');
  else if (selectedMood === '很难过' || selectedMood === '有点低落') msgs.push('今天辛苦了，明天会更好的 🤗');
  else msgs.push('平平淡淡也是一种幸福 ✨');
  if (earlyRise && earlySleep) msgs.push('作息超级棒，继续保持！');
  else if (earlyRise) msgs.push('早起很厉害！今晚争取早点睡~');
  else if (earlySleep) msgs.push('昨晚睡得好，今天元气满满！');

  document.getElementById('successEmoji').textContent = MOOD_EMOJIS[selectedMood];
  document.getElementById('successMsg').textContent = msgs.join('\n');
  document.getElementById('successOverlay').classList.add('show');
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
  document.getElementById('formView').style.display = 'none';
  document.getElementById('checkedView').style.display = 'block';
  document.getElementById('streakNum').textContent = calcStreak();
}

function openHistory() {
  const records = getRecords();
  const keys = Object.keys(records).sort().reverse();
  const content = document.getElementById('historyContent');

  if (keys.length === 0) {
    content.innerHTML = `<div class="empty-state"><span class="empty-emoji">🌱</span>还没有打卡记录<br>快去完成第一次打卡吧！</div>`;
  } else {
    content.innerHTML = keys.map(key => {
      const r = records[key];
      const sleepStatus = r.earlyRise && r.earlySleep ? '早起早睡 🌟' : r.earlyRise ? '早起 🌅' : r.earlySleep ? '早睡 🌙' : '作息待改善 💤';
      return `<div class="history-item">
        <div class="history-date">${formatDate(key)}</div>
        <div class="history-row">${MOOD_EMOJIS[r.mood] || '😐'} 心情：${r.mood}</div>
        <div class="history-row">💤 作息：${sleepStatus}</div>
        ${r.note ? `<div class="history-note">📝 ${r.note}</div>` : ''}
      </div>`;
    }).join('');
  }

  document.getElementById('historyPanel').classList.add('open');
}

function closeHistory() {
  document.getElementById('historyPanel').classList.remove('open');
}

init();
</script>
</body>
</html>
